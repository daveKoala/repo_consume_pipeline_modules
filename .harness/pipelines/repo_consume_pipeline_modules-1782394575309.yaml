pipeline:
  identifier: Build_daveKoala_repo_consume_pipeline_modules_1782394589089
  name: Build repo_consume_pipeline_modules
  orgIdentifier: default
  projectIdentifier: myfirst
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github
        repoName: daveKoala/repo_consume_pipeline_modules
  stages:
    # =========================================================
    # STAGE 1: PRE-BUILD  -> tests + validation (BLOCKING)
    # =========================================================
    - stage:
        name: pre-build
        identifier: prebuild
        description: Pre build tests and validation. All steps blocking.
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Context
                  identifier: Context
                  description: Print build + codebase context
                  spec:
                    shell: Sh
                    command: |-
                      echo "Build ID: <+pipeline.sequenceId>"
                      echo "Execution ID: <+pipeline.executionId>"
                      echo "Repo: <+codebase.repoName>"
                      echo "Branch: <+codebase.branch>"
                      echo "Commit SHA: <+codebase.commitSha>"
                      echo "Triggered by: <+trigger.triggeredBy.name>"
              - parallel:
                  - step:
                      type: Run
                      name: Lint
                      identifier: Lint
                      description: Static analysis / lint (blocking)
                      spec:
                        shell: Sh
                        command: echo "pre-build - lint"
                  - step:
                      type: Run
                      name: Unit_Tests
                      identifier: Unit_Tests
                      description: Unit tests (blocking)
                      spec:
                        shell: Sh
                        command: echo "pre-build - unit tests"
              - step:
                  type: Run
                  name: Validate_Config
                  identifier: Validate_Config
                  description: Config / schema validation (blocking)
                  spec:
                    shell: Sh
                    command: echo "pre-build - validate config + manifests"
    # =========================================================
    # STAGE 2: BUILD  -> build + artefact creation (BLOCKING)
    # =========================================================
    - stage:
        name: build
        identifier: build
        description: Build and artefact creation. Blocking.
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Build
                  identifier: Build
                  description: Compile / build application
                  spec:
                    shell: Sh
                    command: echo "build - compile application"
              - step:
                  type: Run
                  name: Create_Artefact
                  identifier: Create_Artefact
                  description: >-
                    Create build-info.txt + publish as artifact. Also export the
                    contents (base64) as an output variable so later stages
                    (which run on separate machines) can read it.
                  spec:
                    shell: Sh
                    command: |-
                      echo "build - create artefact"
                      echo "build - artefact version <+pipeline.sequenceId>"

                      # ---- create the artefact file ----
                      cat > build-info.txt <<EOF
                      Service:      repo_consume_pipeline_modules
                      Build ID:     <+pipeline.sequenceId>
                      Execution ID: <+pipeline.executionId>
                      Repo:         <+codebase.repoName>
                      Branch:       <+codebase.branch>
                      Commit SHA:   <+codebase.commitSha>
                      Built At:     $(date -u +"%Y-%m-%dT%H:%M:%SZ")
                      EOF

                      echo "----- build-info.txt -----"
                      cat build-info.txt
                      echo "--------------------------"

                      # carry contents across stages (stages run on separate machines)
                      export BUILD_INFO_B64="$(base64 build-info.txt | tr -d '\n')"
                    outputVariables:
                      - name: BUILD_INFO_B64
    # =========================================================
    # DEPLOY -> DEV  (feature/**)  AUTO, no gate
    #   "any developer can push code here"
    # =========================================================
    - stage:
        name: Deploy DEV
        identifier: Deploy_DEV
        description: Auto deploy to DEV from feature/** branches. No approval.
        type: CI
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("feature/")
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy_DEV
                  identifier: Deploy_DEV_step
                  description: Deploy to DEV + echo build context
                  spec:
                    shell: Sh
                    command: |-
                      echo "===== DEPLOY -> DEV ====="
                      echo "Build ID:    <+pipeline.sequenceId>"
                      echo "Execution:   <+pipeline.executionId>"
                      echo "Branch:      <+codebase.branch>"
                      echo "Commit SHA:  <+codebase.commitSha>"
              - step:
                  type: Run
                  name: Verify_DEV
                  identifier: Verify_DEV
                  description: Read artefact + verify (version/health)
                  spec:
                    shell: Sh
                    command: |-
                      echo "<+pipeline.stages.build.spec.execution.steps.Create_Artefact.output.outputVariables.BUILD_INFO_B64>" | base64 -d > build-info.txt
                      cat build-info.txt
                      echo "DEV - verify version == <+pipeline.sequenceId>"
                      echo "DEV - health + readiness OK"
    # =========================================================
    # DEPLOY -> TEST  (release/**)  AUTO on push/create/PR
    # =========================================================
    - stage:
        name: Deploy TEST
        identifier: Deploy_TEST
        description: Auto deploy to TEST from release/** branches.
        type: CI
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy_TEST
                  identifier: Deploy_TEST_step
                  description: Deploy to TEST + echo build context
                  spec:
                    shell: Sh
                    command: |-
                      echo "===== DEPLOY -> TEST ====="
                      echo "Build ID:    <+pipeline.sequenceId>"
                      echo "Execution:   <+pipeline.executionId>"
                      echo "Branch:      <+codebase.branch>"
                      echo "Commit SHA:  <+codebase.commitSha>"
              - step:
                  type: Run
                  name: Verify_TEST
                  identifier: Verify_TEST
                  description: Read artefact + blocking verification
                  spec:
                    shell: Sh
                    command: |-
                      echo "<+pipeline.stages.build.spec.execution.steps.Create_Artefact.output.outputVariables.BUILD_INFO_B64>" | base64 -d > build-info.txt
                      cat build-info.txt
                      echo "TEST - verify version == <+pipeline.sequenceId>"
                      echo "TEST - health + readiness OK"
                      echo "TEST - migration status OK"
                      echo "TEST - non-destructive API validation OK"
              # ---- ADVISORY (non-blocking) ----
              - parallel:
                  - step:
                      type: Run
                      name: OpenAPI_Fuzz
                      identifier: OpenAPI_Fuzz
                      description: ADVISORY - OpenAPI fuzzing. Failure ignored.
                      spec:
                        shell: Sh
                        command: echo "TEST - ADVISORY OpenAPI fuzzing"
                      failureStrategies:
                        - onFailure:
                            errors:
                              - AllErrors
                            action:
                              type: Ignore
                  - step:
                      type: Run
                      name: Perf_Smoke
                      identifier: Perf_Smoke
                      description: ADVISORY - performance smoke test. Failure ignored.
                      spec:
                        shell: Sh
                        command: echo "TEST - ADVISORY performance smoke test"
                      failureStrategies:
                        - onFailure:
                            errors:
                              - AllErrors
                            action:
                              type: Ignore
    # =========================================================
    # MANUAL GATE -> approve promotion to UAT  (release/**)
    # =========================================================
    - stage:
        name: Approve UAT
        identifier: Approve_UAT
        description: Manual approval gate before UAT.
        type: Approval
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve UAT
                  identifier: Approve_UAT_step
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Approve promotion of build <+pipeline.sequenceId>
                      (SHA <+codebase.commitSha>) to UAT.
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
    # =========================================================
    # DEPLOY -> UAT  (release/**)  after approval
    # =========================================================
    - stage:
        name: Deploy UAT
        identifier: Deploy_UAT
        description: Deploy to UAT after manual approval.
        type: CI
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy_UAT
                  identifier: Deploy_UAT_step
                  description: Deploy to UAT + echo build context
                  spec:
                    shell: Sh
                    command: |-
                      echo "===== DEPLOY -> UAT ====="
                      echo "Build ID:    <+pipeline.sequenceId>"
                      echo "Execution:   <+pipeline.executionId>"
                      echo "Branch:      <+codebase.branch>"
                      echo "Commit SHA:  <+codebase.commitSha>"
              - step:
                  type: Run
                  name: Verify_UAT
                  identifier: Verify_UAT
                  description: Read artefact + verify
                  spec:
                    shell: Sh
                    command: |-
                      echo "<+pipeline.stages.build.spec.execution.steps.Create_Artefact.output.outputVariables.BUILD_INFO_B64>" | base64 -d > build-info.txt
                      cat build-info.txt
                      echo "UAT - verify version == <+pipeline.sequenceId>"
                      echo "UAT - health + readiness OK"
    # =========================================================
    # MANUAL GATE -> approve promotion to LIVE  (release/**)
    # =========================================================
    - stage:
        name: Approve LIVE
        identifier: Approve_LIVE
        description: Manual approval gate before LIVE / production.
        type: Approval
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve LIVE
                  identifier: Approve_LIVE_step
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Approve promotion of build <+pipeline.sequenceId>
                      (SHA <+codebase.commitSha>) to LIVE / production.
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
    # =========================================================
    # DEPLOY -> LIVE  (release/**)  after approval
    # =========================================================
    - stage:
        name: Deploy LIVE
        identifier: Deploy_LIVE
        description: Deploy to LIVE / production after manual approval.
        type: CI
        when:
          pipelineStatus: Success
          condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy_LIVE
                  identifier: Deploy_LIVE_step
                  description: Deploy to LIVE + echo build context
                  spec:
                    shell: Sh
                    command: |-
                      echo "===== DEPLOY -> LIVE ====="
                      echo "Build ID:    <+pipeline.sequenceId>"
                      echo "Execution:   <+pipeline.executionId>"
                      echo "Branch:      <+codebase.branch>"
                      echo "Commit SHA:  <+codebase.commitSha>"
              - step:
                  type: Run
                  name: Verify_LIVE
                  identifier: Verify_LIVE
                  description: Read artefact + verify
                  spec:
                    shell: Sh
                    command: |-
                      echo "<+pipeline.stages.build.spec.execution.steps.Create_Artefact.output.outputVariables.BUILD_INFO_B64>" | base64 -d > build-info.txt
                      cat build-info.txt
                      echo "LIVE - verify version == <+pipeline.sequenceId>"
                      echo "LIVE - health + readiness OK"
