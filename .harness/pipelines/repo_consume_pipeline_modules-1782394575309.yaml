pipeline:
  identifier: Build_daveKoala_repo_consume_pipeline_modules_1782394589089
  name: Release repo_consume_pipeline_modules
  orgIdentifier: default
  projectIdentifier: myfirst
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github
        repoName: daveKoala/repo_consume_pipeline_modules
  # ---------------------------------------------------------
  # RELEASE pipeline (release/** push + PR).
  # Flow: Pre-build -> Build -> Deploy TEST (+advisory)
  #       -> Approve UAT -> Deploy UAT
  #       -> Approve LIVE -> Deploy LIVE
  # All stages are template refs (Pre_Build / Build / Deploy_Env / Approve_Env).
  # ---------------------------------------------------------
  # Risk-appetite toggles for 3rd-party tools (consumed by Pre_Build).
  #   off | advisory | blocking
  # ---------------------------------------------------------
  variables:
    - name: sonarqube_mode
      type: String
      description: SonarQube risk mode - off | advisory | blocking
      required: false
      value: <+input>.default(advisory).allowedValues(off,advisory,blocking)
    - name: phpstan_mode
      type: String
      description: PHPStan risk mode - off | advisory | blocking
      required: false
      value: <+input>.default(advisory).allowedValues(off,advisory,blocking)
  stages:
    # =========================================================
    # STAGE 1: PRE-BUILD  (template)
    # =========================================================
    - stage:
        name: Pre-build
        identifier: PreBuild
        template:
          templateRef: Pre_Build
          versionLabel: v1
    # =========================================================
    # STAGE 2: BUILD  (template) -- identifier MUST be 'Build'
    #   so Deploy_Env's Verify step can read the artefact output.
    # =========================================================
    - stage:
        name: Build
        identifier: Build
        template:
          templateRef: Build_Stage
          versionLabel: v1
    # =========================================================
    # DEPLOY -> TEST  (release/**)  AUTO, advisory on
    # =========================================================
    - stage:
        name: Deploy TEST
        identifier: DeployTest
        template:
          templateRef: Deploy_Env
          versionLabel: v1
          templateInputs:
            type: CI
            when:
              condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
            variables:
              - name: envName
                type: String
                value: TEST
              - name: runAdvisory
                type: String
                value: "true"
    # =========================================================
    # MANUAL GATE -> approve promotion to UAT
    # =========================================================
    - stage:
        name: Approve UAT
        identifier: ApproveUat
        template:
          templateRef: Approve_Env
          versionLabel: v1
          templateInputs:
            type: Approval
            when:
              condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
            variables:
              - name: targetEnv
                type: String
                value: UAT
    # =========================================================
    # DEPLOY -> UAT  after approval
    # =========================================================
    - stage:
        name: Deploy UAT
        identifier: DeployUat
        template:
          templateRef: Deploy_Env
          versionLabel: v1
          templateInputs:
            type: CI
            when:
              condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
            variables:
              - name: envName
                type: String
                value: UAT
              - name: runAdvisory
                type: String
                value: "false"
    # =========================================================
    # MANUAL GATE -> approve promotion to LIVE
    # =========================================================
    - stage:
        name: Approve LIVE
        identifier: ApproveLive
        template:
          templateRef: Approve_Env
          versionLabel: v1
          templateInputs:
            type: Approval
            when:
              condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
            variables:
              - name: targetEnv
                type: String
                value: LIVE
    # =========================================================
    # DEPLOY -> LIVE  after approval
    # =========================================================
    - stage:
        name: Deploy LIVE
        identifier: DeployLive
        template:
          templateRef: Deploy_Env
          versionLabel: v1
          templateInputs:
            type: CI
            when:
              condition: <+codebase.branch>.startsWith("release/") || <+codebase.targetBranch>.startsWith("release/")
            variables:
              - name: envName
                type: String
                value: LIVE
              - name: runAdvisory
                type: String
                value: "false"
